name: Diagnosticar Compilación SnapLinux MP3 v3.2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  debug-build:
    name: Diagnosticar en Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependencias del Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Instalar Librerías de Python
        run: pip install pyinstaller yt-dlp mutagen pillow

      - name: Intentar Compilación y Capturar Error Real
        run: |
          xvfb-run --server-args="-screen 0 1024x768x24" pyinstaller --onefile --windowed --name=snaplinux-mp3-linux src/snaplinux.py || true
          
      - name: Mostrar Logs de Error de PyInstaller
        run: |
          if [ -d "build/snaplinux-mp3-linux" ]; then
            echo "=== LOG DE COMPILACIÓN ==="
            cat build/snaplinux-mp3-linux/warn-snaplinux-mp3-linux.txt || echo "No se encontró archivo de advertencias."
          else
            echo "PyInstaller falló antes de crear la carpeta build."
          fi
