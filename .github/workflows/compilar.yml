name: Compilar SnapLinux MP3 a Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Descargar Código del Repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar Dependencias del Proyecto
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp mutagen pillow pyinstaller

    - name: Descargar e Integrar FFmpeg Nativo para Windows
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_extracted"
        Move-Item "ffmpeg_extracted\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe" .\ffmpeg.exe
        Move-Item "ffmpeg_extracted\ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe" .\ffprobe.exe

    - name: Compilar con PyInstaller (.EXE Único)
      run: |
        pyinstaller --onefile --windowed --add-data "ffmpeg.exe;." --add-data "ffprobe.exe;." src/snaplinux.py

    - name: Crear Release Oficial en GitHub
      uses: softprops/action-gh-release@v2
      with:
        files: dist/snaplinux.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
