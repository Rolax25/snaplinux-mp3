name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .deb
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Subir .deb como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: snaplinux-deb
          path: "*.deb"

  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install pyinstaller yt-dlp mutagen pillow

      - name: Descargar ffmpeg estático para Windows
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/latest/download/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_extracted"
          $bin = Get-ChildItem -Path "ffmpeg_extracted" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          $binDir = Split-Path $bin.FullName
          Copy-Item "$binDir\ffmpeg.exe" -Destination "."
          Copy-Item "$binDir\ffprobe.exe" -Destination "."

      - name: Compilar .exe con PyInstaller (con ícono y ffmpeg embebido)
        run: |
          pyinstaller --onefile --windowed --name SnapLinuxMP3 `
            --icon "icon.ico" `
            --add-binary "ffmpeg.exe;." `
            --add-binary "ffprobe.exe;." `
            src/snaplinux.py

      - name: Subir .exe como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: snaplinux-exe
          path: "dist/SnapLinuxMP3.exe"

  release:
    needs: [build-linux-deb, build-windows-exe]
    runs-on: ubuntu-latest
    steps:
      - name: Descargar artefacto .deb
        uses: actions/download-artifact@v4
        with:
          name: snaplinux-deb
          path: release-files

      - name: Descargar artefacto .exe
        uses: actions/download-artifact@v4
        with:
          name: snaplinux-exe
          path: release-files

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
