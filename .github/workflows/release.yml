name: Build and Release

on:
  push:
    tags:
      - "v*"

# Permisos necesarios para que GitHub Actions pueda crear la Release y subir archivos
permissions:
  contents: write

jobs:
  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .deb
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Subir .deb como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: snaplinux-deb
          path: "*.deb"

  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" # Cambiado a 3.10 para coincidir exactamente con tu entorno

      - name: Instalar dependencias
        run: |
          pip install pyinstaller yt-dlp mutagen pillow

      - name: Compilar .exe con PyInstaller
        run: |
          pyinstaller --onefile --windowed --name SnapLinuxMP3 src/snaplinux.py

      - name: Subir .exe como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: snaplinux-exe
          path: "dist/SnapLinuxMP3.exe"

  release:
    needs: [build-linux-deb, build-windows-exe]
    runs-on: ubuntu-latest
    steps:
      - name: Descargar artefacto .deb
        uses: actions/download-artifact@v4
        with:
          name: snaplinux-deb
          path: release-files

      - name: Descargar artefacto .exe
        uses: actions/download-artifact@v4
        with:
          name: snaplinux-exe
          path: release-files

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/*.deb
            release-files/SnapLinuxMP3.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
